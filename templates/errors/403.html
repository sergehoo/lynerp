<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>403 — Accès refusé · LyneERP</title>
<style>
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
       background:#f9fafb;color:#111827;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{max-width:420px;padding:3rem 2rem;text-align:center;background:#fff;
        border:1px solid #e5e7eb;border-radius:1rem;box-shadow:0 10px 30px rgba(0,0,0,.06)}
  .code{font-size:4rem;font-weight:800;color:#ef4444;margin:0}
  h1{font-size:1.4rem;margin:.5rem 0 0;color:#111827}
  p{color:#6b7280;line-height:1.5}
  a{display:inline-block;margin-top:1.5rem;padding:.7rem 1.2rem;background:#4f46e5;color:#fff;
    text-decoration:none;border-radius:.6rem;font-weight:600}
  a:hover{background:#4338ca}
</style>
</head>
<body>
  <main class="card">
    <p class="code">403</p>
    <h1>Accès refusé</h1>
    <p>Vous n'avez pas les permissions nécessaires pour accéder à cette ressource.</p>
    <a href="/">Retour à l'accueil</a>
  </main>
</body>
</html>
