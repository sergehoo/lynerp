[pytest]
DJANGO_SETTINGS_MODULE = Lyneerp.settings.test
python_files = tests.py test_*.py *_tests.py
addopts = -ra --strict-markers --reuse-db
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    slow: tests longs (> 1s)
    integration: tests qui touchent une DB ou un service externe
