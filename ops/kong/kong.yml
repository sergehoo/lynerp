# =============================================================================
# Configuration déclarative Kong pour LYNEERP (mode DB-less).
#
# Le fichier est monté dans le conteneur Kong via :
#   - ./ops/kong/kong.yml:/kong.yml:ro
#
# Les noms d'hôtes ci-dessous (`rh.lyneerp.local`, `sso.lyneerp.local`,
# `files.lyneerp.local`) doivent être ajoutés dans /etc/hosts pour le dev :
#
#   127.0.0.1  rh.lyneerp.local sso.lyneerp.local files.lyneerp.local
#
# En production, Traefik / Kong gère ces hosts via DNS public.
# =============================================================================

_format_version: "3.0"

services:
  # ---------------------------------------------------------------------------
  # Application Django (RH + Finance + Tenants + API)
  # ---------------------------------------------------------------------------
  - name: lyneerp-app
    url: http://rh:8000
    routes:
      - name: lyneerp-host
        hosts: ["rh.lyneerp.local"]
        strip_path: false
        paths: ["/"]
    plugins:
      # Inject `X-Module: rh` pour la reconnaissance côté Django.
      - name: request-transformer
        config:
          add:
            headers:
              - "X-Module:rh"

      # CORS — ouvert en dev, à restreindre en prod (env-driven).
      - name: cors
        config:
          origins:
            - "*"
          methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
          headers:
            - "Authorization"
            - "Content-Type"
            - "X-Tenant-Id"
            - "X-Requested-With"
            - "X-CSRFToken"
            - "Idempotency-Key"
          exposed_headers:
            - "*"
          credentials: true
          max_age: 3600

      # Rate-limiting global (à ajuster en prod).
      - name: rate-limiting
        config:
          minute: 600
          hour: 10000
          policy: local
          fault_tolerant: true

  # ---------------------------------------------------------------------------
  # Keycloak (SSO)
  # ---------------------------------------------------------------------------
  - name: keycloak
    url: http://keycloak:8080
    routes:
      - name: sso-host
        hosts: ["sso.lyneerp.local"]
        strip_path: false
        paths: ["/"]

  # ---------------------------------------------------------------------------
  # MinIO (fichiers / médias)
  # ---------------------------------------------------------------------------
  - name: minio
    url: http://lyneminio:9000
    routes:
      - name: files-host
        hosts: ["files.lyneerp.local"]
        strip_path: false
        paths: ["/"]
    plugins:
      # MinIO doit autoriser les requêtes signées avec ses propres headers.
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "PUT", "POST", "HEAD", "OPTIONS"]
          headers:
            - "Authorization"
            - "Content-Type"
            - "x-amz-content-sha256"
            - "x-amz-date"
          credentials: false
          max_age: 3600

# =============================================================================
# Plugins globaux (s'appliquent à toutes les routes)
# =============================================================================
plugins:
  # Logs structurés en stdout (utile en dev).
  - name: file-log
    config:
      path: /dev/stdout
      reopen: false
